<section class="sp-pagination-arrow-small__pagination" aria-labelledby="pagination-title">
  <div class="sp-pagination-arrow-small__pagination__area">
    <header class="sp-pagination-arrow-small__pagination__header">
      <h2 id="pagination-title" class="sp-pagination-arrow-small__pagination__title">Pagination</h2>
    </header>
    <nav class="sp-pagination-arrow-small__pagination__nav" aria-label="Page navigation">
      <ul class="sp-pagination-arrow-small__pagination__list">
        <li class="sp-pagination-arrow-small__pagination__item">
          <button class="sp-pagination-arrow-small__pagination__button" aria-label="First page">
            <i class="sp-icon sp-icon-chevron-double-left"></i>
          </button>
        </li>
        <li class="sp-pagination-arrow-small__pagination__item">
          <button class="sp-pagination-arrow-small__pagination__button" aria-label="Previous page">
            <i class="sp-icon sp-icon-chevron-left"></i>
          </button>
        </li>
        <li class="sp-pagination-arrow-small__pagination__item">
          <button class="sp-pagination-arrow-small__pagination__button sp-pagination-arrow-small__pagination__button--active" aria-current="page">1</button>
        </li>
        <li class="sp-pagination-arrow-small__pagination__item">
          <button class="sp-pagination-arrow-small__pagination__button">2</button>
        </li>
        <li class="sp-pagination-arrow-small__pagination__item">
          <button class="sp-pagination-arrow-small__pagination__button">3</button>
        </li>
        <li class="sp-pagination-arrow-small__pagination__item">
          <span class="sp-pagination-arrow-small__pagination__ellipsis">...</span>
        </li>
        <li class="sp-pagination-arrow-small__pagination__item">
          <button class="sp-pagination-arrow-small__pagination__button">10</button>
        </li>
        <li class="sp-pagination-arrow-small__pagination__item">
          <button class="sp-pagination-arrow-small__pagination__button" aria-label="Next page">
            <i class="sp-icon sp-icon-chevron-right"></i>
          </button>
        </li>
        <li class="sp-pagination-arrow-small__pagination__item">
          <button class="sp-pagination-arrow-small__pagination__button" aria-label="Last page">
            <i class="sp-icon sp-icon-chevron-double-right"></i>
          </button>
        </li>
      </ul>
    </nav>
  </div>
</section>
