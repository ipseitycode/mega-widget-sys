<section class="sp-email-tower-medium__email" aria-labelledby="email-title">
  <div class="sp-email-tower-medium__email__area shop-color-success">
    <header class="sp-email-tower-medium__email__header">
      <div class="sp-email-tower-medium__email__icon-wrapper">
        <i class="sp-icon sp-icon-envelope-fill sp-email-tower-medium__email__icon"></i>
        <i class="sp-icon sp-icon-stars sp-email-tower-medium__email__stars"></i>
      </div>
      <h2 id="email-title" class="sp-email-tower-medium__email__title">
        Verifique seu e-mail
      </h2>
    </header>
    <article class="sp-email-tower-medium__email__body">
      <p class="sp-email-tower-medium__email__description">
        Para manter uma comunidade confiável e segura, enviamos um e-mail para 
        <strong>design.ageeva@gmail.com</strong> para verificação. Você só precisará fazer isso uma vez.
      </p>
      <p class="sp-email-tower-medium__email__help">
        Não é o e-mail correto? 
        <a href="#" class="sp-email-tower-medium__email__link">Alterar endereço de e-mail</a>
      </p>
    </article>
    <footer class="sp-email-tower-medium__email__footer">
      <button class="sp-email-tower-medium__email__button" type="button">
        Abrir meu e-mail agora
      </button>
      <p class="sp-email-tower-medium__email__help">
        Não recebeu? 
        <a href="#" class="sp-email-tower-medium__email__link">Reenviar e-mail</a>
      </p>
    </footer>
